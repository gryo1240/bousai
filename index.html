 <li>ベストは<b>玄関</b>か<b>寝室</b>。地震は寝ている時に来ることも多い</li>
 <li>押し入れの奥・物置はNG。取り出せなければ無いのと同じ</li>
 <li>家族それぞれが自分のリュックを持つ場合は、各自の寝室に</li>
 <li>車がある家は、車にも水・毛布・簡易トイレを少し積んでおくと二重の備えになる</li></ul>`},
 {t:"年2回の点検日を決めよう",b:`<p>備えは「作って終わり」ではなく「たまに見直す」が大事。おすすめは<b>3月と9月(防災週間)の年2回</b>、日付を決めて点検することです。</p>
 <h4>点検チェック</h4>
 <ul><li>食品・水の賞味期限(切れそうなら普段の食事で消費して買い足す=ローリングストック)</li>
 <li>電池の液漏れ・モバイルバッテリーの充電</li>
 <li>子どもの服・おむつ・靴のサイズアウト</li>
 <li>薬・連絡先メモの内容が最新か</li></ul>
 <p>このアプリのチェックを一度リセットして、実物を見ながら付け直すのが確実です。</p>`},
 {t:"家族で決めておく3つのこと",b:`<p>物の備えと同じくらい大事なのが「約束の備え」です。</p>
 <ol><li><b>集合場所</b> — 家に戻れない時にどこで会うか(小学校・公園など2段階で)</li>
 <li><b>連絡手段</b> — 災害用伝言ダイヤル「171」の使い方を家族全員で一度練習しておく。遠方の親戚を中継役に決めるのも有効</li>
 <li><b>役割</b> — 誰がリュックを持つか、誰が子ども・ペットを担当するか</li></ol>
 <p>決めた内容は紙に書いて、このリストの「家族の連絡先・集合場所メモ」としてリュックに入れましょう。</p>`},
 {t:"よくある「入れすぎ」と「見落とし」",b:`<h4>入れがちだけど見直したい物</h4>
 <ul><li>缶切りが要る缶詰(そのまま食べられる物に)</li><li>大量の水(持ち出しは1人1.5L程度に。残りは家に備蓄)</li><li>ろうそく(火災リスク。ライトで代用)</li></ul>
 <h4>見落としがちな物</h4>
 <ul><li>簡易トイレ(断水で最初に困るのがトイレ)</li><li>小銭と10円玉(停電時はレジも公衆電話も現金)</li><li>スリッパ(避難所の床は冷たい)</li><li>メガネの予備・コンタクト用品</li></ul>`}
];

/* ============ 状態 ============ */
const KEY="bousai-v1";
const $=s=>document.querySelector(s);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const s=JSON.parse(raw); if(s&&s.fam) return s; } }catch(e){}
  return { fam:{adult:2,kid:0,baby:0,senior:0,pet:0,woman:true}, have:{} };
}
let S=load();
let saveFailWarned=false;
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ if(!saveFailWarned){ saveFailWarned=true; alert("端末内の保存容量がいっぱいで、変更を保存できませんでした。"); } }
}
function copyText(t,btn,doneLabel){
  const ok=()=>{ if(btn) btn.textContent=doneLabel; };
  const fb=()=>{ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); ok(); }catch(e){ alert("コピーできませんでした"); } ta.remove(); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(fb); } else fb();
}

/* ============ リスト生成 ============ */
function visibleItems(){
  const f=S.fam;
  return ITEMS.filter(it=>{
    if(!it.grp) return true;
    if(it.grp==="baby") return f.baby>0;
    if(it.grp==="kid") return f.kid>0;
    if(it.grp==="senior") return f.senior>0;
    if(it.grp==="woman") return !!f.woman;
    if(it.grp==="pet") return f.pet>0;
    return true;
  });
}
function progress(){
  const vis=visibleItems();
  const done=vis.filter(it=>S.have[it.id]).length;
  return {done, total:vis.length, pct: vis.length?Math.round(done/vis.length*100):0};
}

/* ============ リュックタブ ============ */
const FAMF=[
 ["adult","大人","18〜64歳"],
 ["kid","子ども","小学生〜高校生くらい"],
 ["baby","乳幼児","0歳〜未就学"],
 ["senior","高齢の家族","65歳以上の目安"],
 ["pet","ペット","犬・猫など"]
];
function renderPack(){
  const el=$("#tab-pack");
  const p=progress();
  let html=`<div class="card">
    <div class="row"><b class="grow">わが家の備え</b><span class="big">${p.pct}%</span></div>
    <div class="pbar" style="margin-top:6px"><div style="width:${p.pct}%"></div></div>
    <p class="small pnum" style="margin-top:4px">${p.done} / ${p.total} 準備できています${p.pct===100?" 🎉 すばらしい!":""}</p>
  </div>`;
  html+=`<div class="card"><div class="grouphead" style="margin:0 0 4px">家族構成(リストが自動で変わります)</div>`;
  FAMF.forEach(([k,label,hint])=>{
    html+=`<div class="fam"><span class="lb">${label}<span class="hint">${hint}</span></span>
      <button data-dec="${k}" aria-label="${label}を減らす">−</button>
      <span class="num">${S.fam[k]}</span>
      <button data-inc="${k}" aria-label="${label}を増やす">＋</button>
    </div>`;
  });
  html+=`<div class="fam"><span class="lb">女性がいる<span class="hint">生理用品・防犯グッズをリストに追加</span></span>
    <span class="seg"><button id="womanBtn" class="${S.fam.woman?"on":""}" style="white-space:nowrap; min-width:64px">${S.fam.woman?"はい":"いいえ"}</button></span>
  </div></div>`;
  const vis=visibleItems();
  CATS.forEach(cat=>{
    const items=vis.filter(it=>it.cat===cat);
    if(!items.length) return;
    const dn=items.filter(it=>S.have[it.id]).length;
    html+=`<h2>${esc(cat)} <span class="small pnum">${dn}/${items.length}</span></h2><div class="card">`;
    items.forEach(it=>{
      html+=`<div class="item ${S.have[it.id]?"done":""}">
        <input type="checkbox" data-have="${it.id}" ${S.have[it.id]?"checked":""}>
        <div class="nm">
          <div class="t">${esc(it.name)} <span class="q">${esc(it.q(S.fam))}</span></div>
          ${it.s?`<div class="s">${esc(it.s)}</div>`:""}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<p class="small">数量は3日間しのぐための一般的な目安です。ご家庭の事情に合わせて調整してください。</p>`;
  el.innerHTML=html;
  el.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{ const k=b.dataset.inc; S.fam[k]=Math.min(9,(S.fam[k]||0)+1); save(); renderPack(); updateHead(); });
  el.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{ const k=b.dataset.dec; S.fam[k]=Math.max(0,(S.fam[k]||0)-1); save(); renderPack(); updateHead(); });
  $("#womanBtn").onclick=()=>{ S.fam.woman=!S.fam.woman; save(); renderPack(); updateHead(); };
  el.querySelectorAll("[data-have]").forEach(c=>c.onchange=()=>{
    if(c.checked) S.have[c.dataset.have]=true; else delete S.have[c.dataset.have];
    save(); renderPack(); updateHead();
  });
}

/* ============ 足りない物タブ ============ */
function renderShop(){
  const el=$("#tab-shop");
  const vis=visibleItems();
  const missing=vis.filter(it=>!S.have[it.id]);
  let html="";
  if(!missing.length){
    html+=`<div class="card"><p><b>🎉 ぜんぶ準備できています!</b></p>
    <p class="small" style="margin-top:6px">次は「知識」タブの点検日を決めて、年2回の見直しを習慣にしましょう。</p></div>`;
  } else {
    html+=`<div class="notice">あと <b>${missing.length}個</b> で完成。ほとんどは100均・ドラッグストア・ホームセンターで揃います。</div>`;
    CATS.forEach(cat=>{
      const items=missing.filter(it=>it.cat===cat);
      if(!items.length) return;
      html+=`<h2>${esc(cat)}</h2><div class="card">`;
      items.forEach(it=>{
        html+=`<div class="item">
          <input type="checkbox" data-have2="${it.id}">
          <div class="nm"><div class="t">${esc(it.name)} <span class="q">${esc(it.q(S.fam))}</span></div></div>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`<button class="primary" id="shopCopy" style="width:100%; margin-top:4px">📋 買い物リストをコピー</button>
    <p class="small" style="margin-top:6px">買ったらチェック→「リュック」タブの準備率に反映されます。</p>`;
  }
  el.innerHTML=html;
  el.querySelectorAll("[data-have2]").forEach(c=>c.onchange=()=>{
    if(c.checked) S.have[c.dataset.have2]=true; else delete S.have[c.dataset.have2];
    save(); renderShop(); updateHead();
  });
  const btn=$("#shopCopy");
  if(btn) btn.onclick=()=>{
    let t="【防災リュックの買い物リスト】\n";
    CATS.forEach(cat=>{
      const items=missing.filter(it=>it.cat===cat);
      if(!items.length) return;
      t+=`\n■${cat}\n`+items.map(it=>`・${it.name}(${it.q(S.fam)})`).join("\n")+"\n";
    });
    copyText(t,btn,"✅ コピーしました");
  };
}

/* ============ 知識タブ ============ */
function renderKnow(){
  const el=$("#tab-know");
  el.innerHTML=`<p class="small" style="margin-bottom:8px">「作って終わり」にしないための知識です。</p>`+
    ARTICLES.map((a,i)=>`<div class="card article"><details ${i===0?"open":""}><summary>${esc(a.t)}</summary>${a.b}</details></div>`).join("");
}

/* ============ 設定タブ ============ */
function renderSettings(){
  const el=$("#tab-settings");
  el.innerHTML=`
  <div class="card">
    <h2 style="margin-top:0">このアプリについて</h2>
    <p class="small">家族構成に合わせて防災リュック(一次持ち出し品)の中身リストを作り、準備状況をチェックできるアプリです。数量は一般的な目安で、3日間をしのぐことを想定しています。</p>
    <p class="small" style="margin-top:6px">チェック状況・家族構成は<b>この端末の中にだけ</b>保存されます。外部への送信はありません。アカウント登録も不要です。</p>
  </div>
  <div class="card">
    <h2 style="margin-top:0">データ</h2>
    <div class="row">
      <button id="btnExport" class="ghost">書き出す(コピー)</button>
      <button id="btnImport" class="ghost">貼り付けて読み込む</button>
      <button id="btnReset" class="ghost" style="color:var(--warn)">全データ初期化</button>
    </div>
    <textarea id="ioArea" placeholder="書き出し結果 / 読み込み時はここに貼り付け" style="margin-top:8px"></textarea>
    <p class="small">年2回の点検で「チェックだけリセット」したい場合も、ここから初期化して付け直すのがおすすめです(家族構成は入れ直してください)。</p>
  </div>`;
  $("#btnExport").onclick=()=>{
    const t=JSON.stringify(S);
    $("#ioArea").value=t; copyText(t,$("#btnExport"),"✅ コピーしました");
  };
  $("#btnImport").onclick=()=>{
    try{
      const o=JSON.parse($("#ioArea").value); if(!o||!o.fam) throw 0;
      S=o; save(); render(); alert("読み込みました");
    }catch(e){ alert("読み込めませんでした。書き出した文字列をそのまま貼ってください。"); }
  };
  $("#btnReset").onclick=()=>{
    if(confirm("この端末のデータをすべて消します。よろしいですか?")){
      localStorage.removeItem(KEY); location.reload();
    }
  };
}

/* ============ タブ・起動 ============ */
let tab="pack";
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>{ tab=b.dataset.tab; render(); });
});
function updateHead(){
  const p=progress();
  $("#hSub").textContent=`準備 ${p.pct}%`;
}
function render(){
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  ["pack","shop","know","settings"].forEach(t=>{ $("#tab-"+t).hidden=(t!==tab); });
  if(tab==="pack") renderPack();
  if(tab==="shop") renderShop();
  if(tab==="know") renderKnow();
  if(tab==="settings") renderSettings();
  updateHead();
}
render();
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
</script>
</body>
</html>
